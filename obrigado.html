<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Obrigado — DUO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--yellow:#ffad17;--orange:#ff7600;--ink:#0a0a0a}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--ink);color:#fff;font:16px/1.5 'DM Sans',sans-serif}.page{position:relative;min-height:100vh;display:grid;align-items:center;overflow:hidden}.page:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 78% 22%,rgba(255,173,23,.18),transparent 32%),linear-gradient(135deg,#121212,#050505)}.wrap{position:relative;width:min(100% - 48px,1180px);margin:auto;padding:110px 0}.logo{position:absolute;top:28px;left:0;width:76px;height:46px;object-fit:contain}.kicker{color:var(--yellow);font-size:11px;font-weight:700;letter-spacing:.16em}.content{max-width:920px}h1{margin:18px 0 28px;font:800 clamp(4rem,10vw,9rem)/.86 Outfit,sans-serif;letter-spacing:-.075em;text-transform:uppercase}p{max-width:560px;margin:0;color:#c9c9c9;font-size:clamp(1.05rem,1.7vw,1.25rem)}.line{position:absolute;left:0;right:0;bottom:0;height:13px;background:linear-gradient(90deg,var(--yellow),var(--orange))}@media(max-width:550px){.wrap{width:min(100% - 28px,1180px);padding:100px 0 70px}.logo{top:22px;width:58px}h1{font-size:3.8rem}}
  </style>
</head>
<body>
  <main class="page"><div class="wrap"><img class="logo" src="assets/images/duo-logo.png" alt="DUO"><div class="content"><div class="kicker">PEDIDO RECEBIDO</div><h1>Obrigado</h1><p>Iremos entrar em contacto o mais rápido possível.</p></div></div><div class="line"></div></main>
</body>
</html>
